[build]
  command = "pnpm install --frozen-lockfile && pnpm build"
  publish = "dist"

# Skip deploy previews for PRs entirely — we don't need them for a
# solo-dev marketing site, and they double the Netlify build-minute spend.
# Local `pnpm build` verifies before merge. Only main-branch pushes get built.
[context.deploy-preview]
  ignore = "exit 0"

# Same for any non-main branch push (e.g., feature branches pushed directly).
[context.branch-deploy]
  ignore = "exit 0"

[build.environment]
  # Astro 6 requires Node >=22.12. Using v22 LTS.
  NODE_VERSION = "22"
  PNPM_VERSION = "10"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "interest-cohort=()"
    Strict-Transport-Security = "max-age=15552000; includeSubDomains"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[build.processing]
  skip_processing = false
[build.processing.css]
  bundle = true
  minify = true
[build.processing.js]
  bundle = true
  minify = true
[build.processing.html]
  pretty_urls = true
